name: Generate Datas

on:
  schedule: # executa a cada 12 horas
    - cron: "* */12 * * *"
  
  # Permite rodar manualmente na aba Actions
  workflow_dispatch:
  
  # Roda a action sempre que houver um push na branch main
  push:
    branches:
    - main

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Gera a animação da cobrinha baseada no seu gráfico
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Faz o push das imagens geradas para a branch "output"
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
